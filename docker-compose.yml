services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  ingest:
    build:
      context: ./batch
    env_file: .env
    volumes:
      - ./data:/app/data:ro
      - ./batch/sources.yaml:/app/sources.yaml:ro
    profiles:
      - batch

